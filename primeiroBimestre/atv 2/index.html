<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form>
        <h1>Formulário de Cadastro</h1>
        <fieldset>
            <legend>Crie sua Conta</legend>
            
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome">
            
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="seuemail@dominio.com" required>
            
            <label for="senha">Senha (mínimo 8 caracteres):</label>
            <input type="password" id="senha" name="senha" minlength="8" required>
            
            <strong>Gênero:</strong>
            <input type="radio" id="masculino" name="genero" value="masculino">
            <label for="masculino">Masculino</label><br>
            
            <input type="radio" id="feminino" name="genero" value="feminino">
            <label for="feminino">Feminino</label><br>
            
            <input type="radio" id="outro" name="genero" value="outro">
            <label for="outro">Outro</label><br><br>
            
            <label for="bio">Biografia:</label>
            <textarea id="bio" name="bio" rows="4" placeholder="Fale um pouco sobre você..."></textarea>
            <input type="checkbox" id="termos" name="termos" required>
            
            <label for="termos">Eu li e aceito os termos de serviço.</label>
            
            <button type="submit">Enviar</button>
        </fieldset>
    </form>
</body>
</html>
